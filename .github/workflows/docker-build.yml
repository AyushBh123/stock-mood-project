name: Test Docker Build

# 1. Tell the robot WHEN to run (every time we push to the 'main' branch)
on:
  push:
    branches: [ "main" ]

# 2. Tell the robot WHAT to do
jobs:
  build-and-test:
    # Give the robot a temporary cloud computer to work on
    runs-on: ubuntu-latest

    steps:
    # Step A: Download our code from GitHub onto the cloud computer
    - name: Check out the code
      uses: actions/checkout@v3

    # Step B: Try to build the Docker box. If this fails, we know our code is broken!
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag stock-mood-api:test

    # NEW: This pushes the working code to the live internet!
    - name: Deploy to Hugging Face Spaces
      uses: huggingface/spaces-github-action@main
      with:
        hf_token: ${{ secrets.HF_TOKEN }}
        space_id: AyushBh020106/stock-mood-ring