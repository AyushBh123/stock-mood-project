name: Test and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out code (fetch-depth: 0 ensures we get the whole Git history to push)
    - name: Check out the code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 2. Build the Docker box to make sure nothing is broken
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag stock-mood-api:test

    # 3. The Fix! Force-push directly to Hugging Face using secure Git commands
    - name: Deploy to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git remote add space https://AyushBh020106:$HF_TOKEN@huggingface.co/spaces/AyushBh020106/stock-mood-ring
        git push --force space main